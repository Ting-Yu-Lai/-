<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>國立科技高中-校園社團介紹網</title>

    <style>
      * {
        box-sizing: border-box;
        font-family: "標楷體";
      }

      body {
        width: 1024px;
        height: 768px;
        margin: auto;
      }

      header {
        width: 100%;
        height: 65px;
        margin: auto;
        border-top: 1px solid black;
        border-left: 1px solid black;
        border-right: 1px solid black;
      }

      header img {
        margin-left: 10px;
      }

      .container {
        width: 100%;
        height: calc(768px - 65px - 20px);

        margin: auto;
        display: flex;
        justify-content: center;
        align-items: center;
        border-left: 1px solid black;
        border-right: 1px solid black;
      }

      .container-left {
        width: 215px;
        height: 100%;

        display: flex;
        flex-direction: column;
      }

      .cl-top {
        width: 100%;
        height: calc(100% - 25px);
        border-top: 1px solid black;
        display: flex;
        flex-direction: column;
        text-align: center;
      }

      .cl-top-text {
        font-weight: 500;
        font-size: 24px;
        text-decoration: underline;
        color: #ff00ff;
      }

      .top-text {
        font-weight: 500;
        color: #000000;
        font-size: 16px;
        width: 200px;
        height: 35px;
        background-image: url(./images/menu1.png);
        margin: 10px;
        /* text-align: center; */
        padding-top: 8px;
      }

      .top-text:hover {
        background-image: url(./images/menu2.png);
      }

      .cl-bottom {
        width: 100%;
        height: 25px;
        border-top: 1px solid black;
        color: #000000;
        text-align: center;
        font-size: 16px;
      }

      .container-right {
        width: calc(100% - 215px);
        height: 100%;
      }

      .cr-top {
        width: 100%;
        height: 29px;
        border-bottom: 1px solid black;
        border-left: 1px solid black;
        border-top: 1px solid black;
      }

      marquee {
        font-size: 24px;
        color: #0000ff;
      }
      .cr-bottom {
        width: 100%;
        height: calc(100% - 29px);
        border-left: 1px solid black;
        border-bottom: 1px solid black;
      }

      footer {
        width: 100%;
        height: 20px;
        margin: auto;
        border-bottom: 1px solid black;
        border-left: 1px solid black;
        border-right: 1px solid black;
        border-top: 1px solid black;
        font-size: 16px;
        color:#000000;
        text-align: center;
      }

      iframe {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <!-- header -->
    <header>
      <a href="index.html">
        <img src="./images/logo.png" alt="國立科技高中校園社團介紹網" />
      </a>
    </header>

    <!-- container -->
    <div class="container">
      <!-- container-left -->
      <div class="container-left">
        <!-- cl-top -->
        <div class="cl-top">
          <div class="cl-top-text">社團介紹</div>
          <div class="top-text">
            <a href="guitar_history.html" target="myIframe"> 吉他社 </a>
          </div>
          <div class="top-text">熱舞社</div>
          <div class="top-text">棒球社</div>
          <div class="top-text">羽球社</div>
          <div class="top-text">足球社</div>
          <div class="top-text">童軍社</div>
        </div>
        <!-- cl-bottom -->
        <div class="cl-bottom">最近更新日期:2025:05:24</div>
      </div>

      <!-- container-right -->
      <div class="container-right">
        <!-- cr-top -->
        <div class="cr-top">
          <marquee behavior="left" direction="0">
            歡迎光臨校園社團介紹網，參觀後請支持社團活動並熱烈參與
          </marquee>
        </div>
        <!-- cr-bottom -->
        <div class="cr-bottom">
          <iframe src="./main.html" frameborder="0" name="myIframe"></iframe>
        </div>
      </div>
    </div>

    <!-- footer -->
    <footer>
      網頁設計及維護:10賴廷育
    </footer>
  </body>
</html>
